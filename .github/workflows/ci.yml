name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint (zero warnings + formatting)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-03-10
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Check clippy (deny warnings)
        run: cargo clippy --tests -- -D warnings

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: garage-secrets-controller:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    name: Execute Rust tests inside Docker image
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  rust-coverage:
    name: Rust coverage
    needs: [lint, build]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-03-10
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        run: cargo llvm-cov --json --output-path coverage.json test --locked --ignore-filename-regex '.*target/.*'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.json
          retention-days: 1

  compare-coverage:
    name: Compare coverage against main
    needs: [build, rust-coverage, test]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download PR coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Check out main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-03-10
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate main coverage report
        run: cd main && cargo llvm-cov --json --output-path ../main-coverage.json test --locked --ignore-filename-regex '.*target/.*'

      - name: Install jq and bc
        run: sudo apt-get update && sudo apt-get install -y jq bc

      - name: Compare coverage
        run: |
          if [ ! -f coverage.json ]; then
            echo "No PR coverage report available, skipping comparison"
            exit 0
          fi
          PR_COVERAGE=$(jq '.lines.percent.coveraged' coverage.json)
          MAIN_COVERAGE=$(jq '.lines.percent.coveraged' main-coverage.json)

          echo "PR branch coverage: ${PR_COVERAGE}%"
          echo "Main branch coverage: ${MAIN_COVERAGE}%"

          DROP=$(echo "${MAIN_COVERAGE} - ${PR_COVERAGE}" | bc -l)
          THRESHOLD=$(echo "${DROP} > 0.5" | bc -l)

          if [ "$THRESHOLD" = "1" ]; then
            echo "::error::Coverage dropped by $(printf '%.2f' ${DROP})% (main: ${MAIN_COVERAGE}%, PR: ${PR_COVERAGE}%). Minimum 0.5% tolerance allowed."
            exit 1
          fi

          echo "Coverage comparison passed (within 0.5% tolerance)"

  push-main:
    name: Push Docker image (main)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-pr:
    name: Push Docker image (PR #${{ github.event.pull_request.number }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}-pr${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
